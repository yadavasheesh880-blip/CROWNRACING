<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crown Racing - Live Stream</title>
    <!-- Video.js library for playing live streams -->
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    
    <style>
        /* Basic Dark Theme Styling */
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #1f1f1f;
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid #ffcc00; /* Crown Gold accent color */
        }
        h1 {
            margin: 0;
            color: #ffcc00;
            letter-spacing: 2px;
        }
        .main-container {
            display: flex;
            flex-wrap: wrap;
            max-width: 1200px;
            margin: 20px auto;
            gap: 20px;
            padding: 0 15px;
        }
        .video-section {
            flex: 3;
            min-width: 300px;
        }
        .chat-section {
            flex: 1;
            background-color: #1f1f1f;
            border-radius: 8px;
            padding: 15px;
            min-width: 250px;
            display: flex;
            flex-direction: column;
            height: 500px;
        }
        .chat-messages {
            flex-grow: 1;
            background-color: #121212;
            border-radius: 5px;
            padding: 10px;
            margin-bottom: 15px;
            overflow-y: auto;
            font-size: 14px;
        }
        .chat-message {
            margin-bottom: 8px;
            padding-bottom: 8px;
            border-bottom: 1px solid #333;
        }
        .username {
            color: #ffcc00;
            font-weight: bold;
        }
        .chat-input {
            display: flex;
            gap: 10px;
        }
        .chat-input input {
            flex-grow: 1;
            padding: 10px;
            border: none;
            border-radius: 4px;
            background-color: #333;
            color: white;
        }
        .chat-input button {
            padding: 10px 15px;
            background-color: #ffcc00;
            color: #121212;
            font-weight: bold;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .schedule-section {
            background-color: #1f1f1f;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
        }
        .schedule-section ul {
            list-style-type: none;
            padding: 0;
        }
        .schedule-section li {
            padding: 8px 0;
            border-bottom: 1px solid #333;
        }
    </style>
</head>
<body>

    <header>
        <h1>👑 CROWN RACING</h1>
    </header>

    <div class="main-container">
        <!-- Video Player Section -->
        <div class="video-section">
            <video
                id="live-video-player"
                class="video-js vjs-default-skin vjs-big-play-centered"
                controls
                preload="auto"
                width="100%"
                height="500"
                data-setup='{"fluid": true}'
            >
                <!-- Sample stream URL -->
                <source src="Bv1Uizo6dPfntaUmAf2RZs1hgcnKlT2gWUBy9CrOqtqQGXaUkfPAl88EIBe89tEn7yG9Ivm864G" type="application/x-mpegURL">
                <p class="vjs-no-js">
                    To view this video please enable JavaScript, and consider upgrading to a web browser that supports HTML5 video
                </p>
            </video>
            
            <div class="schedule-section">
                <h2>Today's Race Schedule</h2>
                <ul>
                    <li><strong>Delhi Race:</strong> Live Now 🔴</li>
                    <li><strong>Kolkata Race:</strong> 3:30 PM</li>
                    <li><strong>UK Race (Hereford):</strong> 6:00 PM</li>
                </ul>
            </div>
        </div>

        <!-- Live Chat Section -->
        <div class="chat-section">
            <h3 style="margin-top: 0; color: #ffcc00;">Live Chat</h3>
            <div class="chat-messages" id="chat-messages">
                <div class="chat-message">
                    <span class="username" style="color: #4CAF50;">System:</span> Welcome to Crown Racing Live!
                </div>
                <div class="chat-message">
                    <span class="username">LEGEND KILLER:</span> Delhi race start hone wali hai kya?
                </div>
            </div>
            <div class="chat-input">
                <input type="text" placeholder="Type your message..." id="chat-box">
                <button onclick="alert('Backend connect hone par message send hoga!')">Send</button>
            </div>
        </div>
    </div>

    <!-- Video.js Script -->
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
</body>
</html>
